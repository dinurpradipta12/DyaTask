name: Release macOS DMG

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci --progress=false

      - name: Build macOS artifacts
        run: npm run electron:dist:mac

      - name: Verify generated artifacts
        run: |
          ls -lah dist-electron
          test -f dist-electron/latest-mac.yml
          find dist-electron -maxdepth 1 -name "*.dmg" | grep . >/dev/null
          find dist-electron -maxdepth 1 -name "*.zip" | grep . >/dev/null

      - name: Create or update GitHub release
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist-electron/*.dmg \
              dist-electron/*.zip \
              dist-electron/latest-mac.yml \
              --clobber
          else
            gh release create "$TAG" \
              dist-electron/*.dmg \
              dist-electron/*.zip \
              dist-electron/latest-mac.yml \
              --generate-notes \
              --title "$TAG"
          fi
