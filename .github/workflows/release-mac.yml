name: Release macOS DMG

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci --progress=false

      - name: Validate required build secrets
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_ANON_KEY"

      - name: Build macOS artifacts
        run: npm run electron:dist:mac

      - name: Resolve release tag
        id: release_meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            APP_VERSION="$(node scripts/print-app-version.cjs)"
            TAG="v${APP_VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${TAG}"

      - name: Verify generated artifacts
        run: |
          ls -lah dist-electron
          test -f dist-electron/latest-mac.yml
          find dist-electron -maxdepth 1 -name "*.dmg" | grep . >/dev/null
          find dist-electron -maxdepth 1 -name "*.zip" | grep . >/dev/null

      - name: Create or update GitHub release
        run: |
          TAG="${{ steps.release_meta.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist-electron/*.dmg \
              dist-electron/*.zip \
              dist-electron/latest-mac.yml \
              --clobber
          else
            gh release create "$TAG" \
              dist-electron/*.dmg \
              dist-electron/*.zip \
              dist-electron/latest-mac.yml \
              --generate-notes \
              --title "$TAG" \
              --target "$GITHUB_SHA"
          fi
